name: linter

on:
  pull_request:
    branches:
      - main
      - staging
      - develop
      - feature/*
  push:
    branches:
      - main
      - staging
      - develop
      - feature/*

jobs:
  textlint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm exec textlint --fix . || true
      - run: pnpm exec markdownlint --fix "**/*.md" || true
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "fix: auto-fix lint errors"
            git push
          fi
      - run: pnpm run lint
